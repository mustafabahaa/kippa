<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a73e8" />
    <meta
      name="description"
      content="Kippa - Private household finance ledger PWA for USD salary, EGP spending, balances, budget cycles, and reconciliation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Kippa</title>
    
    <!-- Theme Detection Script to prevent visual flash -->
    <script>
      (function() {
        try {
          var key = 'finance_theme_mode';
          var pref = localStorage.getItem(key) || 'system';
          var mode = pref;
          if (pref === 'system') {
            mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', mode);
          document.documentElement.classList.add('theme-' + mode);
        } catch (e) {}
      })();
    </script>

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        transition: background 0.3s ease;
      }
      
      /* Theme Gradients */
      html.theme-dark #splash-screen {
        background: radial-gradient(circle at center, #112d2a 0%, #090a0f 100%);
        color: #f1f0f5;
      }
      html.theme-light #splash-screen {
        background: radial-gradient(circle at center, #f0fdfa 0%, #f8fafc 100%);
        color: #131b2e;
      }

      /* Logo and glow */
      .splash-logo-container {
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.8);
        animation: splashLogoEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, logoPulseFloat 3s infinite ease-in-out 0.8s;
      }
      
      html.theme-dark .splash-logo-container {
        filter: drop-shadow(0 0 25px rgba(15, 118, 110, 0.45));
      }
      html.theme-light .splash-logo-container {
        filter: drop-shadow(0 0 20px rgba(15, 118, 110, 0.15));
      }

      .splash-logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Brand Text */
      .splash-brand {
        margin-top: 24px;
        text-align: center;
        opacity: 0;
        animation: splashFadeIn 0.8s ease-out 0.4s forwards;
      }

      .splash-title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2px;
        margin: 0;
        text-transform: uppercase;
      }

      .splash-subtitle {
        font-size: 13px;
        font-weight: 500;
        margin-top: 6px;
        margin-bottom: 0;
        opacity: 0.7;
        font-style: italic;
      }
      
      html.theme-dark .splash-subtitle {
        color: #9e9bb0;
      }
      html.theme-light .splash-subtitle {
        color: #5f6675;
      }

      /* Sleek progress line */
      .splash-progress-container {
        position: absolute;
        bottom: 60px;
        width: 120px;
        height: 3px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 4px;
        overflow: hidden;
        opacity: 0;
        animation: splashFadeIn 0.8s ease-out 0.6s forwards;
      }
      html.theme-dark .splash-progress-container {
        background: rgba(255, 255, 255, 0.1);
      }

      .splash-progress-bar {
        width: 100%;
        height: 100%;
        background-color: #0f766e;
        transform-origin: 0% 50%;
        animation: splashProgress 1.6s infinite ease-in-out;
      }

      /* Keyframes */
      @keyframes splashLogoEntrance {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes logoPulseFloat {
        0% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-6px) scale(1.04); }
        100% { transform: translateY(0px) scale(1); }
      }

      @keyframes splashFadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes splashProgress {
        0% { transform: translateX(-100%) scaleX(0.2); }
        50% { transform: translateX(0%) scaleX(0.5); }
        100% { transform: translateX(100%) scaleX(0.2); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static splash screen that matches AppLoadingScreen.tsx -->
      <div id="splash-screen">
        <div class="splash-logo-container">
          <img class="splash-logo" id="splash-logo-img" src="/icons/icon.svg" alt="Kippa Logo" />
        </div>
        <div class="splash-brand">
          <h1 class="splash-title">Kippa</h1>
          <p class="splash-subtitle">Private Household Finance</p>
        </div>
        <div class="splash-progress-container">
          <div class="splash-progress-bar"></div>
        </div>
      </div>
      <script>
        // Set correct logo src immediately based on theme preference
        (function() {
          try {
            var mode = document.documentElement.getAttribute('data-theme') || 'light';
            var img = document.getElementById('splash-logo-img');
            if (img) {
              img.src = mode === 'dark' ? '/icons/icon-dark.svg' : '/icons/icon.svg';
            }
          } catch (e) {}
        })();
      </script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
